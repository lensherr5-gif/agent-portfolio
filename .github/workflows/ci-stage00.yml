name: ci-stage00

on:
  push:
    branches: [main]
    paths:
      - "stages/00-foundation/**"
      - ".github/workflows/ci-stage00.yml"
  pull_request:
    branches: [main]
    paths:
      - "stages/00-foundation/**"
      - ".github/workflows/ci-stage00.yml"
  workflow_dispatch:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stages/00-foundation/python-agent-starter
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        run: uv python install 3.13

      - name: Sync deps
        run: uv sync --dev

      - name: Lint
        run: uv run ruff check . && uv run ruff format --check .

      - name: Test
        run: uv run python -m pytest -q
