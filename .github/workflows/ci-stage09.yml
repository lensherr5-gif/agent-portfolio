name: ci-stage09

on:
  push:
    branches: [main, stage09-l1, stage09-l2, stage09-l3]
    paths:
      - "stages/09-skills/**"
      - ".github/workflows/ci-stage09.yml"
  pull_request:
    branches: [main]
    paths:
      - "stages/09-skills/**"
      - ".github/workflows/ci-stage09.yml"
  workflow_dispatch:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stages/09-skills
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.13
      - run: uv sync --dev
      - run: uv run ruff check . && uv run ruff format --check .
      - run: uv run python -m pytest -q
