name: ci-stage07

on:
  push:
    branches: [main, stage07-l1, stage07-l2, stage07-l3]
    paths:
      - "stages/07-multi-agent/**"
      - ".github/workflows/ci-stage07.yml"
  pull_request:
    branches: [main]
    paths:
      - "stages/07-multi-agent/**"
      - ".github/workflows/ci-stage07.yml"
  workflow_dispatch:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stages/07-multi-agent
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.13
      - run: uv sync --dev
      - run: uv run ruff check . && uv run ruff format --check .
      - run: uv run python -m pytest -q
