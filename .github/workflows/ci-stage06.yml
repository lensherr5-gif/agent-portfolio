name: ci-stage06

on:
  push:
    branches: [main, stage06-l1, stage06-l2, stage06-l3]
    paths:
      - "stages/06-memory/**"
      - ".github/workflows/ci-stage06.yml"
  pull_request:
    branches: [main]
    paths:
      - "stages/06-memory/**"
      - ".github/workflows/ci-stage06.yml"
  workflow_dispatch:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stages/06-memory
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.13
      - run: uv sync --dev
      - run: uv run ruff check . && uv run ruff format --check .
      - run: uv run python -m pytest -q
