name: ci-stage08

on:
  push:
    branches: [main, stage08-l1, stage08-l2, stage08-l3]
    paths:
      - "stages/08-mcp/**"
      - ".github/workflows/ci-stage08.yml"
  pull_request:
    branches: [main]
    paths:
      - "stages/08-mcp/**"
      - ".github/workflows/ci-stage08.yml"
  workflow_dispatch:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stages/08-mcp
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.13
      - run: uv sync --dev
      - run: uv run ruff check . && uv run ruff format --check .
      - run: uv run python -m pytest -q
