name: ci-stage03

on:
  push:
    branches: [main, stage03-l1, stage03-l2, stage03-l3]
    paths:
      - "stages/03-react/**"
      - ".github/workflows/ci-stage03.yml"
  pull_request:
    branches: [main]
    paths:
      - "stages/03-react/**"
      - ".github/workflows/ci-stage03.yml"
  workflow_dispatch:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stages/03-react
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.13
      - run: uv sync --dev
      - run: uv run ruff check . && uv run ruff format --check .
      - run: uv run python -m pytest -q
