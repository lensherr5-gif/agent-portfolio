name: ci-stage04

on:
  push:
    branches: [main, stage04-l1, stage04-l2, stage04-l3]
    paths:
      - "stages/04-rag/**"
      - ".github/workflows/ci-stage04.yml"
  pull_request:
    branches: [main]
    paths:
      - "stages/04-rag/**"
      - ".github/workflows/ci-stage04.yml"
  workflow_dispatch:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stages/04-rag
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.13
      - run: uv sync --dev
      - run: uv run ruff check . && uv run ruff format --check .
      - run: uv run python -m pytest -q
